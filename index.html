<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>太空吸塵器 - 無限擴張版</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #0b1026 0%, #050505 70%);
      color: white;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      background: rgba(5, 8, 20, 0.6);
      padding: 14px 18px;
      border-radius: 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      z-index: 10;
      max-width: 360px;
    }

    #ui h1 { margin: 0 0 10px; font-size: 22px; color: #7fd8ff; }
    #ui p { margin: 6px 0; font-size: 14px; }
    .status { font-weight: bold; padding: 2px 8px; border-radius: 4px; }
    .on { background: #2ecc71; color: #04150b; }
    .off { background: #e74c3c; color: white; }
    .hint { color: #ffd166; }
    #dialogHint {
      display: none;
      color: #ffe08a;
      font-weight: bold;
    }
    #dialogBox {
      display: none;
      position: absolute;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      min-width: 280px;
      max-width: 580px;
      padding: 14px 18px;
      background: rgba(5, 8, 20, 0.86);
      border: 1px solid rgba(127, 216, 255, 0.35);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 20;
    }
    #dialogSpeaker {
      color: #7fd8ff;
      font-weight: bold;
      margin-bottom: 6px;
    }
    #dialogText {
      color: #eef6ff;
      line-height: 1.5;
    }
    kbd {
      background: #444;
      border-radius: 3px;
      padding: 1px 5px;
      border: 1px solid #777;
      color: yellow;
    }
  </style>
</head>
<body>

  <div id="ui">
    <h1>太空吸塵器 v2.1</h1>
    <p>移動: <kbd>方向鍵</kbd> | 穩定器: <kbd>T</kbd> | 小地圖: <kbd>M</kbd></p>
    <p>吸塵器: <kbd>Space</kbd> (面向移動方向吸取)</p>
    <p>對話: <kbd>E</kbd> <span class="hint">靠近機器人時可互動</span></p>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
    <p>穩定器: <span id="dampener-status" class="status on">ON</span></p>
    <p>小地圖: <span id="minimap-status" class="status on">ON</span></p>
    <p>清理數量: <span id="score" style="color:#7fd8ff; font-weight:bold; font-size: 18px;">0</span></p>
    <p id="dialogHint">可互動：按 <kbd>E</kbd> 與機器人對話</p>
  </div>

  <div id="dialogBox">
    <div id="dialogSpeaker">維修機器人</div>
    <div id="dialogText">太空船目前壞掉無法使用。</div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const dampenerDisplay = document.getElementById('dampener-status');
    const minimapDisplay = document.getElementById('minimap-status');
    const scoreDisplay = document.getElementById('score');
    const dialogHint = document.getElementById('dialogHint');
    const dialogBox = document.getElementById('dialogBox');
    const dialogText = document.getElementById('dialogText');

    const world = {
      width: 7000,
      height: 7000
    };

    const camera = {
      x: 0,
      y: 0
    };

    const ship = {
      x: 5450,
      y: 4980,
      width: 220,
      height: 120,
      angle: -0.22,
      broken: true
    };

    const robot = {
      x: ship.x - 120,
      y: ship.y + 38,
      radius: 20,
      interactRadius: 110,
      message: '太空船目前壞掉無法使用。'
    };

    let stars = [];
    let debrisList = [];
    let score = 0;
    let keys = {};
    let showMinimap = true;
    let nearRobot = false;
    let dialogVisible = false;

    const player = {
      x: world.width / 2,
      y: world.height / 2,
      vx: 0,
      vy: 0,
      accel: 0.18,
      friction: 0.95,
      isDampenerOn: true,
      radius: 18,
      facing: 0,
      vacuumRange: 220,
      vacuumForce: 0.25,
      collectRadius: 28
    };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars() {
      stars = [];
      for (let i = 0; i < 1200; i++) {
        stars.push({
          x: Math.random() * world.width,
          y: Math.random() * world.height,
          size: Math.random() * 1.5 + 0.5,
          opacity: Math.random() * 0.7 + 0.3,
          parallax: Math.random() * 0.5 + 0.1
        });
      }
    }

    function spawnDebris() {
      debrisList.push({
        x: Math.random() * world.width,
        y: Math.random() * world.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        size: Math.random() * 8 + 6,
        rotation: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.05,
        hue: Math.random() * 360
      });
    }

    for (let i = 0; i < 100; i++) spawnDebris();
    createStars();

    function isVacuumActive() {
      return !!(keys[' '] || keys['Space'] || keys['Spacebar']);
    }

    function showDialog(message) {
      dialogText.textContent = message;
      dialogBox.style.display = 'block';
      dialogVisible = true;
    }

    function hideDialog() {
      dialogBox.style.display = 'none';
      dialogVisible = false;
    }

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (e.code === 'Space') e.preventDefault();

      if (e.key.toLowerCase() === 't' && !e.repeat) {
        player.isDampenerOn = !player.isDampenerOn;
      }

      if (e.key.toLowerCase() === 'm' && !e.repeat) {
        showMinimap = !showMinimap;
      }

      if (e.key.toLowerCase() === 'e' && !e.repeat && nearRobot) {
        showDialog(robot.message);
      }

      if (e.key === 'Escape' && dialogVisible) {
        hideDialog();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function update() {
      if (keys['ArrowUp']) player.vy -= player.accel;
      if (keys['ArrowDown']) player.vy += player.accel;
      if (keys['ArrowLeft']) player.vx -= player.accel;
      if (keys['ArrowRight']) player.vx += player.accel;

      if (player.isDampenerOn) {
        if (!keys['ArrowUp'] && !keys['ArrowDown']) player.vy *= player.friction;
        if (!keys['ArrowLeft'] && !keys['ArrowRight']) player.vx *= player.friction;
      }

      player.x += player.vx;
      player.y += player.vy;

      if (player.x < player.radius) { player.x = player.radius; player.vx *= -0.5; }
      if (player.x > world.width - player.radius) { player.x = world.width - player.radius; player.vx *= -0.5; }
      if (player.y < player.radius) { player.y = player.radius; player.vy *= -0.5; }
      if (player.y > world.height - player.radius) { player.y = world.height - player.radius; player.vy *= -0.5; }

      if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
        player.facing = Math.atan2(player.vy, player.vx);
      }

      camera.x = player.x - canvas.width / 2;
      camera.y = player.y - canvas.height / 2;
      camera.x = Math.max(0, Math.min(camera.x, world.width - canvas.width));
      camera.y = Math.max(0, Math.min(camera.y, world.height - canvas.height));

      const vacuumActive = isVacuumActive();
      for (let i = debrisList.length - 1; i >= 0; i--) {
        const d = debrisList[i];
        const dx = player.x - d.x;
        const dy = player.y - d.y;
        const dist = Math.hypot(dx, dy);

        if (vacuumActive && dist < player.vacuumRange && dist > 0.001) {
          const pull = (1 - dist / player.vacuumRange) * player.vacuumForce;
          d.vx += (dx / dist) * pull;
          d.vy += (dy / dist) * pull;
        }

        d.x += d.vx;
        d.y += d.vy;
        d.rotation += d.spin;
        d.vx *= 0.995;
        d.vy *= 0.995;

        if (d.x < 0) d.x += world.width;
        if (d.x > world.width) d.x -= world.width;
        if (d.y < 0) d.y += world.height;
        if (d.y > world.height) d.y -= world.height;

        if (dist < player.collectRadius) {
          debrisList.splice(i, 1);
          score++;
          spawnDebris();
        }
      }

      const robotDx = player.x - robot.x;
      const robotDy = player.y - robot.y;
      nearRobot = Math.hypot(robotDx, robotDy) < robot.interactRadius;
      dialogHint.style.display = nearRobot ? 'block' : 'none';
      if (!nearRobot && dialogVisible) {
        hideDialog();
      }

      dampenerDisplay.innerText = player.isDampenerOn ? 'ON' : 'OFF';
      dampenerDisplay.className = 'status ' + (player.isDampenerOn ? 'on' : 'off');
      minimapDisplay.innerText = showMinimap ? 'ON' : 'OFF';
      minimapDisplay.className = 'status ' + (showMinimap ? 'on' : 'off');
      scoreDisplay.innerText = score;
    }

    function drawMinimap() {
      const size = 180;
      const pad = 20;
      const scaleX = size / world.width;
      const scaleY = size / world.height;

      ctx.save();
      ctx.translate(canvas.width - size - pad, canvas.height - size - pad);

      ctx.fillStyle = 'rgba(0, 10, 30, 0.8)';
      ctx.fillRect(0, 0, size, size);
      ctx.strokeStyle = 'rgba(127, 216, 255, 0.3)';
      ctx.strokeRect(0, 0, size, size);

      ctx.fillStyle = '#7fd8ff';
      debrisList.forEach(d => {
        ctx.fillRect(d.x * scaleX, d.y * scaleY, 1.5, 1.5);
      });

      ctx.fillStyle = '#b08cff';
      ctx.fillRect(ship.x * scaleX - 3, ship.y * scaleY - 3, 8, 8);

      ctx.fillStyle = '#9dff9d';
      ctx.beginPath();
      ctx.arc(robot.x * scaleX, robot.y * scaleY, 2.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(player.x * scaleX, player.y * scaleY, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawStars() {
      stars.forEach(s => {
        const sx = (s.x - camera.x * s.parallax + world.width) % world.width;
        const sy = (s.y - camera.y * s.parallax + world.height) % world.height;
        ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
        ctx.fillRect(sx, sy, s.size, s.size);
      });
    }

    function drawDebris() {
      debrisList.forEach(d => {
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rotation);
        ctx.fillStyle = `hsl(${d.hue}, 60%, 70%)`;
        ctx.beginPath();
        ctx.moveTo(-d.size, -d.size / 2);
        ctx.lineTo(d.size, -d.size);
        ctx.lineTo(d.size / 2, d.size);
        ctx.lineTo(-d.size, d.size / 2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });
    }

    function drawVacuumBeam() {
      if (!isVacuumActive()) return;

      const beamLength = player.vacuumRange;
      const beamWidth = 70;
      const nozzleX = player.x + Math.cos(player.facing) * 22;
      const nozzleY = player.y + Math.sin(player.facing) * 22;

      ctx.save();
      ctx.translate(nozzleX, nozzleY);
      ctx.rotate(player.facing);

      const gradient = ctx.createLinearGradient(0, 0, beamLength, 0);
      gradient.addColorStop(0, 'rgba(140, 220, 255, 0.35)');
      gradient.addColorStop(1, 'rgba(140, 220, 255, 0)');

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(beamLength, -beamWidth / 2);
      ctx.lineTo(beamLength, beamWidth / 2);
      ctx.closePath();
      ctx.fill();

      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = `rgba(180, 235, 255, ${0.35 - i * 0.08})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(beamLength * (0.75 + i * 0.08), (-beamWidth / 3) + i * 22);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.facing);

      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(-8, 14);
      ctx.lineTo(-18, 26);
      ctx.moveTo(8, 14);
      ctx.lineTo(18, 26);
      ctx.moveTo(-18, -2);
      ctx.lineTo(-32, 8);
      ctx.moveTo(12, -4);
      ctx.lineTo(28, -8);
      ctx.stroke();

      ctx.fillStyle = '#e9eef7';
      ctx.beginPath();
      ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#b8c7d9';
      ctx.fillRect(-10, 12, 20, 18);

      ctx.fillStyle = '#7fd8ff';
      ctx.beginPath();
      ctx.ellipse(6, -4, 11, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#8a8f98';
      ctx.fillRect(10, 4, 20, 6);
      ctx.fillRect(24, 2, 8, 10);

      if (isVacuumActive()) {
        ctx.fillStyle = '#b8ecff';
        ctx.beginPath();
        ctx.arc(36, 7, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawBrokenShip() {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);

      ctx.fillStyle = '#596273';
      ctx.beginPath();
      ctx.moveTo(-95, 0);
      ctx.quadraticCurveTo(-20, -70, 90, -18);
      ctx.quadraticCurveTo(110, 0, 88, 18);
      ctx.quadraticCurveTo(-20, 68, -95, 0);
      ctx.fill();

      ctx.fillStyle = '#394252';
      ctx.beginPath();
      ctx.moveTo(-70, -8);
      ctx.lineTo(-18, -42);
      ctx.lineTo(54, -18);
      ctx.lineTo(36, 8);
      ctx.lineTo(-38, 20);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#7fd8ff';
      ctx.beginPath();
      ctx.ellipse(18, -8, 28, 16, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#2e3440';
      ctx.fillRect(-110, -18, 28, 36);
      ctx.fillRect(60, -12, 34, 24);

      ctx.strokeStyle = '#9aa4b5';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-8, 10);
      ctx.lineTo(22, 34);
      ctx.moveTo(40, -28);
      ctx.lineTo(78, -58);
      ctx.stroke();

      ctx.strokeStyle = '#ff6b6b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(-10, 6, 18, -0.8, 1.5);
      ctx.stroke();

      ctx.fillStyle = 'rgba(255, 120, 120, 0.22)';
      ctx.beginPath();
      ctx.arc(86, -56, 16, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawRobot() {
      const pulse = 0.5 + Math.sin(Date.now() * 0.006) * 0.5;

      ctx.save();
      ctx.translate(robot.x, robot.y);

      ctx.fillStyle = '#94f0b4';
      ctx.beginPath();
      ctx.arc(0, -18, 14, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#d9e4f2';
      ctx.fillRect(-14, -6, 28, 28);
      ctx.fillStyle = '#5c6f86';
      ctx.fillRect(-8, 0, 16, 14);

      ctx.strokeStyle = '#cfd9e6';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-10, 22);
      ctx.lineTo(-18, 36);
      ctx.moveTo(10, 22);
      ctx.lineTo(18, 36);
      ctx.moveTo(-14, 2);
      ctx.lineTo(-28, 12);
      ctx.moveTo(14, 2);
      ctx.lineTo(28, 12);
      ctx.stroke();

      ctx.fillStyle = '#0c2238';
      ctx.beginPath();
      ctx.arc(-4, -20, 2.2, 0, Math.PI * 2);
      ctx.arc(4, -20, 2.2, 0, Math.PI * 2);
      ctx.fill();

      if (nearRobot) {
        ctx.strokeStyle = `rgba(148, 240, 180, ${0.35 + pulse * 0.35})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 8, robot.interactRadius * 0.55, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawInteractionMarker() {
      if (!nearRobot) return;

      ctx.save();
      ctx.translate(robot.x, robot.y - 64);
      ctx.fillStyle = 'rgba(255, 224, 138, 0.95)';
      ctx.beginPath();
      ctx.roundRect(-22, -14, 44, 28, 10);
      ctx.fill();
      ctx.fillStyle = '#1a1d24';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('E', 0, 1);
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStars();

      ctx.save();
      ctx.translate(-camera.x, -camera.y);

      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, 0, world.width, world.height);

      drawDebris();
      drawBrokenShip();
      drawRobot();
      drawVacuumBeam();
      drawPlayer();
      drawInteractionMarker();

      ctx.restore();

      if (showMinimap) drawMinimap();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>

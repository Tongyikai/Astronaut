<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>太空吸塵器 - 原型開發</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            color: white;
            font-family: Arial;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .status {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .on {
            background: #2ecc71;
        }

        .off {
            background: #e74c3c;
        }
    </style>
</head>

<body>

    <div id="ui">
        <h1>太空吸塵器測試版</h1>
        <p>移動: 方向鍵 | 切換穩定器: <b style="color:yellow">T</b></p>
        <p>穩定器狀態: <span id="dampener-status" class="status on">ON</span></p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const dampenerDisplay = document.getElementById('dampener-status');

        // 初始化畫布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 遊戲邏輯變數
        let keys = {};
        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: 0,
            vy: 0,
            accel: 0.15,
            friction: 0.95, // 穩定器煞車力道
            isDampenerOn: true,
            radius: 15
        };

        // 監聽鍵盤
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key.toLowerCase() === 't') {
                player.isDampenerOn = !player.isDampenerOn;
                updateUI();
            }
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        function updateUI() {
            dampenerDisplay.innerText = player.isDampenerOn ? "ON" : "OFF";
            dampenerDisplay.className = "status " + (player.isDampenerOn ? "on" : "off");
        }

        function update() {
            // 噴氣加速
            if (keys['ArrowUp']) player.vy -= player.accel;
            if (keys['ArrowDown']) player.vy += player.accel;
            if (keys['ArrowLeft']) player.vx -= player.accel;
            if (keys['ArrowRight']) player.vx += player.accel;

            // 穩定器邏輯 (自動減速)
            if (player.isDampenerOn) {
                // 如果沒按按鍵，就施加摩擦力
                if (!keys['ArrowUp'] && !keys['ArrowDown']) player.vy *= player.friction;
                if (!keys['ArrowLeft'] && !keys['ArrowRight']) player.vx *= player.friction;
            }

            // 更新位置
            player.x += player.vx;
            player.y += player.vy;

            // 邊界反彈 (簡單處理)
            if (player.x < 0 || player.x > canvas.width) player.vx *= -0.5;
            if (player.y < 0 || player.y > canvas.height) player.vy *= -0.5;
        }

        function draw() {
            // 清除畫面
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製太空人 (暫時用圓圈代替)
            ctx.save();
            ctx.translate(player.x, player.y);

            // 畫出太空人主體
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();

            // 畫一個簡單的面罩，代表方向
            ctx.fillStyle = '#333';
            ctx.fillRect(5, -5, 10, 10);

            ctx.restore();

            // 循環執行
            update();
            requestAnimationFrame(draw);
        }

        // 啟動遊戲
        draw();

    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astronaut - 正式專案包</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <h1>Astronaut v0.3</h1>
    <p>移動: <kbd>方向鍵</kbd> | 穩定器: <kbd>T</kbd> | 小地圖: <kbd>M</kbd></p>
    <p>吸塵器: <kbd>Space</kbd> | 對話 / 互動: <kbd>E</kbd></p>
    <p>搭乘 / 離開太空船: <kbd>F</kbd></p>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
    <p>穩定器: <span id="dampener-status" class="status on">ON</span></p>
    <p>小地圖: <span id="minimap-status" class="status on">ON</span></p>
    <p>清理數量: <span id="score" style="color:#7fd8ff; font-weight:bold; font-size: 18px;">0</span></p>
    <p>齒輪零件: <span id="gear-status" class="status off">未取得</span></p>
    <p>太空船: <span id="ship-status" class="status off">故障中</span></p>
    <p class="quest" id="questText">任務：前往上方資源回收站，收集 25 個垃圾後拿取齒輪零件。</p>
    <p id="dialogHint">可互動：按 <kbd>E</kbd></p>
  </div>

  <div id="dialogBox">
    <div id="dialogSpeaker">機器人</div>
    <div id="dialogText">……</div>
    <div id="dialogChoices">
      <button id="choiceConfirm" class="choiceBtn">交付齒輪</button>
      <button id="choiceCancel" class="choiceBtn">稍後再說</button>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="game.js"></script>
</body>
</html>
